<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Predictive Maintenance Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="main-container d-flex flex-column justify-content-center align-items-center">
    <div class="card glass-card p-4">
      <h1 class="mb-3 text-center fw-bold">⚙️ Predictive Maintenance</h1>
      <p class="text-center text-muted mb-4">
        Enter sensor data to predict if the machine is at risk of failure.
      </p>

      <form action="/predict" method="POST" class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Air Temperature (K)</label>
          <input type="number" class="form-control" step="0.01" name="air_temp" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Process Temperature (K)</label>
          <input type="number" class="form-control" step="0.01" name="process_temp" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Rotational Speed (rpm)</label>
          <input type="number" class="form-control" step="0.1" name="speed" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Torque (Nm)</label>
          <input type="number" class="form-control" step="0.1" name="torque" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Tool Wear (min)</label>
          <input type="number" class="form-control" step="0.1" name="wear" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Machine Type</label>
          <select class="form-select" name="type" required>
            <option value="0">Type L (0)</option>
            <option value="1">Type M (1)</option>
            <option value="2">Type H (2)</option>
          </select>
        </div>

        <div class="text-center mt-3">
          <button type="submit" class="btn btn-success w-50 fw-bold">
            Predict
          </button>
        </div>
      </form>

      {% if prediction_text %}
      <div class="alert-box mt-4 text-center">
        <h4 class="result-text">{{ prediction_text }}</h4>
      </div>
      {% endif %}
    </div>

</body>
</html>
